<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qual seu Personagem DragonBall Z</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <h2>Descubra qual é o seu personagem</h2>

    <button onclick="iniciarCamera()">
        Ativar câmera
    </button>

    <br><br>

    <video id="camera" autoplay playsinline width="250" style="display:none;"></video>

    <br>

    <button id="btnFoto" onclick="tirarFoto()" style="display:none;">
        Tirar foto
    </button>

    <br><br>

    <button id="btnAnalise" onclick="analisarKI()" style="display:none;">
        Analisar KI
    </button>

    <br><br>

    <canvas id="foto" style="display:none;"></canvas>

    <div id="status"></div>
    <div id="personagem"></div>

    <hr>

    <h2>Quer saber a distância até a casa do Mestre Kami?</h2>

    <button onclick="getDistanciaKame()">
        Calcular distância
    </button>

    <p id="distancia"></p>

    <script src="script.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>

</body>
</html>
